# Generated by Stackform -- review before deploying to production.
name: Stackfor-fastapi

services:
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile.fastapi
    container_name: fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENV: production
    volumes:
      - ./backend:/app
    networks:
      - appnet

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - appnet

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  pgdata:
